{% extends "encyclopedia/layout.html" %}

{% block title %}
    Create New Entry
{% endblock %}

{% block content %}
    <div class="index-container">
        <h1 class="sub-header">Create a New Entry</h1>
        <form action="{% url 'encyclopedia:create_entry' %}" method="post">
            {% csrf_token %}
            {{ form.as_p }}
            {% if error %}
                <p class="alert alert-danger w-20" role="alert">{{ error }}</p>
            {% endif %}
            <button type="submit">Submit</button>
        </form>
    </div>
{% endblock %}
