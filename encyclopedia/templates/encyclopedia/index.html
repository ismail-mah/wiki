{% extends "encyclopedia/layout.html" %}

{% block title %}Wikipedia, the free encyclopedia {% endblock %}

{% block content %}

    <h1>All Entries</h1>

    <ul>
        {% for entry in entries %}
            <li><a href="{% url 'encyclopedia:entry' title=entry %}">{{ entry }}</a></li>
        {% endfor %}
    </ul>

{% endblock %}
