{% extends "encyclopedia/layout.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
    <div class="index-container-entry">
        <h1 class="sub-header-entry">{{ title }}</h1>
        <div class="entry-content">
            {{ content|safe }}
        </div>
        <a href="{% url 'encyclopedia:index' %}">Back to Index</a>

    </div>
{% endblock %}
