{% extends 'encyclopedia/layout.html' %}

{% block title %}Edit {{ title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-9">
            <!-- Header Section -->
            <div class="mb-4">
                <h1 class="display-5 fw-bold mb-2">
                    Editing <span class="text-primary">{{ title }}</span>
                </h1>
                <p class="text-muted">Make your changes below and save when you're done.</p>
            </div>

            <!-- Form Card -->
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <form action="{% url 'edit_entry' title %}" method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            {{ form.as_p }}
                        </div>

                        <!-- Action Buttons -->
                        <div class="d-flex flex-column flex-sm-row gap-3 pt-3 border-top">
                            <button type="submit" class="btn btn-primary btn-lg px-4">
                                <i class="bi bi-check-circle me-2"></i>Save Changes
                            </button>
                            <a href="{% url 'get_entry' title %}" 
                               class="btn btn-outline-secondary btn-lg px-4">
                                <i class="bi bi-x-circle me-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Helper Text -->
            <div class="mt-3 text-muted small">
                <i class="bi bi-info-circle me-1"></i>
                All changes will be saved immediately upon submission.
            </div>
        </div>
    </div>
</div>
{% endblock %}
